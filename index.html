    <title>上海大转盘 - 今天吃什么？</title>
    <style>
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            /* 增加美食背景图 */
            background-image: url('https://images.unsplash.com/photo-1495195134817-a169b2b2b1a0?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            color: white;
        }

        /* 增加黑色半透明遮罩，让文字更清晰 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }

        h1 {
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .wheel-container {
            position: relative;
            width: 400px;
            height: 400px;
        }

        canvas {
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #e74c3c;
            z-index: 10;
        }

        #spin-button {
            margin-top: 30px;
            padding: 12px 40px;
            font-size: 18px;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        #spin-button:hover {
            background-color: #ff6b81;
        }

        .result-container {
            margin-top: 20px;
            text-align: center;
            height: 220px; /* 预留空间，防止页面跳动 */
        }

        #result-text {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        #result-img {
            margin-top: 15px;
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            display: none; /* 一开始隐藏图片 */
        }
    </style>
</head>
